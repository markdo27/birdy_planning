<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birdy — Project Dashboard</title>
  <meta name="description" content="Internal project tracking dashboard for Birdy travel agency web-app development." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Dark mode (default) styling tokens */
      --bg-base:        #080A16;
      --bg-surface:     #0E1122;
      --bg-card:        rgba(255,255,255,0.035);
      --bg-card-hover:  rgba(255,255,255,0.06);
      --border:         rgba(255,255,255,0.06);
      --border-hover:   rgba(255,255,255,0.12);
      --shadow:         rgba(0, 0, 0, 0.35);

      --gold:           #F4A823;
      --gold-lt:        #FFD166;
      --gold-dim:       rgba(244,168,35,0.08);
      --gold-glow:      rgba(244,168,35,0.18);

      --sky:            #38BDF8;
      --sky-dim:        rgba(56,189,248,0.08);

      --mint:           #34D399;
      --mint-dim:       rgba(52,211,153,0.08);

      --violet:         #A78BFA;
      --violet-dim:     rgba(167,139,250,0.08);

      --rose:           #F43F5E;
      --rose-dim:       rgba(244,63,94,0.08);

      --amber:          #FBBF24;

      --text-1:         #F8FAFC;
      --text-2:         #94A3B8;
      --text-3:         #64748B;

      --fh:             'Outfit', sans-serif;
      --fb:             'Inter', sans-serif;

      --r-sm:  8px;
      --r-md:  12px;
      --r-lg:  16px;
      --r-xl:  22px;
      --r-2xl: 28px;
    }

    body.light-theme {
      /* Light mode styling tokens */
      --bg-base:        #F8FAFC;
      --bg-surface:     #FFFFFF;
      --bg-card:        rgba(0,0,0,0.02);
      --bg-card-hover:  rgba(0,0,0,0.04);
      --border:         rgba(15, 23, 42, 0.08);
      --border-hover:   rgba(15, 23, 42, 0.14);
      --shadow:         rgba(15, 23, 42, 0.05);

      --text-1:         #0F172A;
      --text-2:         #475569;
      --text-3:         #94A3B8;

      --gold-dim:       rgba(244,168,35,0.1);
      --sky-dim:        rgba(56,189,248,0.1);
      --mint-dim:       rgba(52,211,153,0.1);
      --violet-dim:     rgba(167,139,250,0.1);
      --rose-dim:       rgba(244,63,94,0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--fb);
      background: var(--bg-base);
      color: var(--text-1);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 15% -5%,  rgba(244,168,35,.06)  0%, transparent 55%),
        radial-gradient(ellipse 65% 45% at 85% 100%, rgba(56,189,248,.04)  0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(167,139,250,.02) 0%, transparent 60%);
    }

    body.light-theme::before {
      background:
        radial-gradient(ellipse 90% 55% at 15% -5%,  rgba(244,168,35,.02)  0%, transparent 55%),
        radial-gradient(ellipse 65% 45% at 85% 100%, rgba(56,189,248,.015) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(167,139,250,.008) 0%, transparent 60%);
    }

    /* ════════════════════════════════════
       HEADER
    ════════════════════════════════════ */
    .header {
      position: relative;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(244,168,35,.06) 0%, transparent 100%);
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 48px 28px;
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 16px; }

    .brand-logo {
      width: 54px; height: 54px;
      border-radius: 15px;
      background: linear-gradient(135deg, #F4A823 0%, #FF6B35 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 32px rgba(244,168,35,.4), 0 0 0 1px rgba(244,168,35,.25);
      flex-shrink: 0;
    }

    .brand-name {
      font-family: var(--fh);
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .1em;
      line-height: 1;
      background: linear-gradient(120deg, #F4A823 0%, #FFD166 50%, #F4A823 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--text-2);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 5px;
      font-weight: 500;
    }

    .header-chips {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .hchip {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 18px;
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      background: var(--bg-card);
      gap: 2px;
      backdrop-filter: blur(8px);
    }

    .hchip-val {
      font-family: var(--fh);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .hchip-lbl {
      font-size: 10px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 100px;
      font-family: var(--fh);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: all .3s;
      flex-shrink: 0;
      cursor: default;
    }
    .sync-badge.synced   { background: var(--mint-dim);  color: var(--mint);  border: 1px solid rgba(52,211,153,.2); }
    .sync-badge.saving   { background: var(--sky-dim);   color: var(--sky);   border: 1px solid rgba(56,189,248,.2); }
    .sync-badge.offline  { background: var(--rose-dim);  color: var(--rose);  border: 1px solid rgba(244,63,94,.2); }
    .sync-badge.local    { background: rgba(255,255,255,.06); color: var(--text-2); border: 1px solid var(--border); }

    .sync-icon { font-size: 12px; }

    .theme-toggle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      outline: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      margin-left: 4px;
    }
    .theme-toggle:hover {
      border-color: var(--border-hover);
      color: var(--text-1);
      background: var(--bg-card-hover);
      transform: scale(1.05);
    }

    .header-meta { text-align: right; }
    .header-meta .h-date { font-size: 13px; color: var(--text-2); font-weight: 500; }
    .header-meta .h-upd  { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    /* ════════════════════════════════════
       PHASE TIMELINE
    ════════════════════════════════════ */
    .phase-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6,9,26,.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .phase-bar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .phase-bar-inner::-webkit-scrollbar { display: none; }

    .phase-step {
      flex: 1;
      min-width: 90px;
      padding: 13px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: background .2s;
      user-select: none;
    }
    .phase-step:hover { background: rgba(255,255,255,.04); }

    .phase-step.completed { border-bottom-color: var(--mint); }
    .phase-step.active    { border-bottom-color: var(--gold); }
    .phase-step.viewing   { background: rgba(255,255,255,.06); border-bottom-width: 3px; }
    .phase-step.viewing.completed { border-bottom-color: var(--mint); }
    .phase-step.viewing.active    { border-bottom-color: var(--gold); }
    .phase-step.viewing.pending   { border-bottom-color: var(--sky);  }
    .phase-step.viewing .phase-lbl { color: var(--text-1); }

    .phase-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 800;
      font-family: var(--fh);
      transition: all .3s;
    }

    .phase-step.completed .phase-dot { background: var(--mint);  color: #032a1a; }
    .phase-step.active    .phase-dot { background: var(--gold);  color: #1a0a00; box-shadow: 0 0 14px var(--gold-glow); }
    .phase-step.pending   .phase-dot { background: rgba(255,255,255,.07); color: var(--text-3); }

    .phase-lbl {
      font-family: var(--fh);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }

    .phase-step.completed .phase-lbl { color: var(--mint); }
    .phase-step.active    .phase-lbl { color: var(--gold); }
    .phase-step.pending   .phase-lbl { color: var(--text-3); }

    .phase-step:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 1px; height: 16px;
      background: var(--border);
    }

    /* ════════════════════════════════════
       MAIN LAYOUT
    ════════════════════════════════════ */
    .main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 48px 80px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    /* ════════════════════════════════════
       SCOPE SECTIONS
    ════════════════════════════════════ */
    .sections { display: flex; flex-direction: column; gap: 18px; }

    .sc {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-2xl);
      overflow: hidden;
      transition: border-color .25s, box-shadow .25s, transform .25s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 6px 20px -4px var(--shadow);
    }
    .sc:hover { 
      border-color: var(--border-hover); 
      box-shadow: 0 12px 30px -4px var(--shadow); 
      transform: translateY(-2px);
    }

    .sc-header {
      padding: 20px 26px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
      transition: background .2s;
    }
    .sc-header:hover { background: rgba(255,255,255,.025); }

    .sc-icon {
      width: 42px; height: 42px;
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      flex-shrink: 0;
    }
    .sc-icon.c-disc   { background: var(--gold-dim);   box-shadow: inset 0 0 0 1px rgba(244,168,35,.2);   }
    .sc-icon.c-road   { background: var(--mint-dim);   box-shadow: inset 0 0 0 1px rgba(52,211,153,.2);   }
    .sc-icon.c-ux     { background: var(--sky-dim);    box-shadow: inset 0 0 0 1px rgba(56,189,248,.2);    }
    .sc-icon.c-ui     { background: var(--violet-dim); box-shadow: inset 0 0 0 1px rgba(167,139,250,.2);   }

    .sc-title-group { flex: 1; min-width: 0; }
    .sc-title { font-family: var(--fh); font-size: 16px; font-weight: 700; }
    .sc-sub   { font-size: 12px; color: var(--text-2); margin-top: 2px; }

    .sc-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .sc-count { font-family: var(--fh); font-size: 14px; font-weight: 800; }

    .ptag {
      font-size: 9.5px; font-weight: 700;
      font-family: var(--fh);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .ptag.t-disc   { background: var(--gold-dim);   color: var(--gold);   border: 1px solid rgba(244,168,35,.22);   }
    .ptag.t-ux     { background: var(--sky-dim);    color: var(--sky);    border: 1px solid rgba(56,189,248,.22);    }
    .ptag.t-ui     { background: var(--violet-dim); color: var(--violet); border: 1px solid rgba(167,139,250,.22);   }
    .ptag.t-road   { background: var(--mint-dim);   color: var(--mint);   border: 1px solid rgba(52,211,153,.22);   }

    .sc-chevron {
      width: 28px; height: 28px;
      border-radius: var(--r-sm);
      background: rgba(255,255,255,.05);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sc-chevron svg { width: 14px; height: 14px; stroke: var(--text-2); transition: transform .3s; }
    .sc.collapsed .sc-chevron svg { transform: rotate(-90deg); }

    .sc-bar { height: 3px; background: rgba(255,255,255,.05); }
    .sc-bar-fill { height: 100%; border-radius: 0 3px 3px 0; transition: width .55s cubic-bezier(.4,0,.2,1); }

    .sc-body { padding: 20px 26px 26px; display: flex; flex-direction: column; gap: 22px; }
    .sc.collapsed .sc-body { display: none; }

    .tg-title {
      font-family: var(--fh);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: var(--text-2);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }

    .tg-badge {
      font-size: 10px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      font-family: var(--fb);
      color: var(--text-3);
      background: rgba(255,255,255,.05);
      border-radius: 100px;
      padding: 2px 9px;
    }

    .tg + .tg { padding-top: 20px; border-top: 1px solid var(--border); }

    .task-list { display: flex; flex-direction: column; gap: 3px; }

    .task-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 12px;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: background .15s;
    }
    .task-row:hover { background: rgba(255,255,255,.04); }
    .task-row:active { background: rgba(255,255,255,.06); transform: scale(0.995); }

    .task-cb {
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 1.5px solid rgba(255,255,255,.18);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      cursor: pointer;
    }
    .task-cb.on {
      background: var(--mint);
      border-color: var(--mint);
      box-shadow: 0 0 10px rgba(52,211,153,.3);
    }
    .task-cb.on::after {
      content: '';
      display: block;
      width: 10px; height: 6px;
      border-left: 2px solid #032a1a;
      border-bottom: 2px solid #032a1a;
      transform: rotate(-45deg) translate(1px,-1px);
    }

    .task-lbl {
      flex: 1;
      font-size: 13.5px;
      color: var(--text-1);
      line-height: 1.45;
      transition: color .2s;
    }
    .task-row.done .task-lbl {
      color: var(--text-3);
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,.18);
    }

    .task-pill {
      font-size: 9.5px;
      font-weight: 700;
      font-family: var(--fh);
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s;
    }
    .pill-todo        { background: rgba(255,255,255,.06); color: var(--text-2); }
    .pill-in-progress { background: var(--sky-dim);        color: var(--sky);    border: 1px solid rgba(56,189,248,.2); }
    .pill-done        { background: var(--mint-dim);       color: var(--mint);   border: 1px solid rgba(52,211,153,.2); }
    .pill-blocked     { background: var(--rose-dim);       color: var(--rose);   border: 1px solid rgba(244,63,94,.2);  }

    /* ════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════ */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: sticky;
      top: 72px;
      height: fit-content;
    }

    .scard {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 6px 20px -4px var(--shadow);
    }

    .scard-title {
      font-family: var(--fh);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--text-2);
      margin-bottom: 18px;
    }

    .scard.phase-card {
      background: linear-gradient(135deg, rgba(244,168,35,.1) 0%, rgba(244,168,35,.03) 100%);
      border-color: rgba(244,168,35,.2);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(244,168,35,.13);
      border: 1px solid rgba(244,168,35,.28);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 12px;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity:1; transform: scale(1); }
      50%       { opacity:.5; transform: scale(.8); }
    }

    .live-txt {
      font-family: var(--fh);
      font-size: 11px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .phase-desc {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.65;
    }

    .chart-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 18px;
    }

    .chart-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .chart-pct {
      font-family: var(--fh);
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .chart-lbl { font-size: 10px; color: var(--text-3); margin-top: 3px; letter-spacing: .08em; text-transform: uppercase; }

    .mini-bars { display: flex; flex-direction: column; gap: 13px; }

    .mbar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .mbar-name { font-size: 11.5px; font-weight: 500; color: var(--text-2); }
    .mbar-pct  { font-family: var(--fh); font-size: 12px; font-weight: 800; color: var(--text-1); }

    .mbar-track { height: 4px; background: rgba(255,255,255,.06); border-radius: 100px; overflow: hidden; }
    .mbar-fill  { height: 100%; border-radius: 100px; transition: width .55s cubic-bezier(.4,0,.2,1); }

    .qstats { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    .qstat {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 13px 14px;
    }

    .qstat-val { font-family: var(--fh); font-size: 26px; font-weight: 900; line-height: 1; }

    .qstat-lbl {
      font-size: 9.5px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-top: 4px;
    }

    .rm-items { display: flex; flex-direction: column; gap: 10px; }

    .rm-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 14px;
      border-radius: var(--r-md);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
    }

    .rm-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .rm-title { font-family: var(--fh); font-size: 13px; font-weight: 800; }
    .rm-sub   { font-size: 11px; color: var(--text-2); margin-top: 2px; line-height: 1.4; }
    .rm-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 9.5px; font-weight: 700;
      font-family: var(--fh);
      letter-spacing: .07em;
      padding: 2px 9px;
      border-radius: 100px;
    }

    footer {
      text-align: center;
      padding: 20px 48px;
      font-size: 12px;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .sc { animation: fadeUp .4s ease backwards; }
    .sc:nth-child(1) { animation-delay: .04s; }
    .sc:nth-child(2) { animation-delay: .09s; }
    .sc:nth-child(3) { animation-delay: .14s; }
    .sc:nth-child(4) { animation-delay: .19s; }

    .sidebar > * { animation: fadeUp .4s ease backwards; }
    .sidebar > *:nth-child(1) { animation-delay: .07s; }
    .sidebar > *:nth-child(2) { animation-delay: .12s; }
    .sidebar > *:nth-child(3) { animation-delay: .17s; }
    .sidebar > *:nth-child(4) { animation-delay: .22s; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .sync-spin { animation: spin 1s linear infinite; display: inline-block; }

    /* Phase advance button */
    .phase-advance-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 18px;
      margin-top: 14px;
      border: none;
      border-radius: var(--r-md);
      font-family: var(--fh);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .25s;
    }
    .phase-advance-btn.ready {
      background: linear-gradient(135deg, var(--gold) 0%, #FF8C00 100%);
      color: #1a0a00;
      box-shadow: 0 4px 20px rgba(244,168,35,.4);
    }
    .phase-advance-btn.ready:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(244,168,35,.55);
    }
    .phase-advance-btn.not-ready {
      background: rgba(255,255,255,.05);
      color: var(--text-3);
      cursor: default;
      border: 1px solid var(--border);
    }
    .phase-advance-btn .btn-arrow { font-size: 14px; }

    /* Completed phase card style */
    .scard.phase-card.all-done {
      background: linear-gradient(135deg, rgba(52,211,153,.1) 0%, rgba(52,211,153,.03) 100%);
      border-color: rgba(52,211,153,.2);
    }

    @media (max-width: 1024px) {
      .main { grid-template-columns: 1fr; padding: 20px 24px 60px; }
      .sidebar { position: static; }
      .header-inner { padding: 24px; }
      .phase-bar-inner { padding: 0 24px; }
    }

    /* Empty state for phases with no sections */
    .phase-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 30px;
      border-radius: var(--r-lg);
      background: var(--bg-card);
      border: 1px dashed var(--border);
    }
    .phase-empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: .4;
    }
    .phase-empty-title {
      font-family: var(--fh);
      font-size: 16px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 6px;
    }
    .phase-empty-sub {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.5;
      max-width: 340px;
    }

    @media (max-width: 640px) {
      .header-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
      .header-meta  { text-align: left; }
      .header-chips { margin-left: 0; }
    }

    /* ════════════════════════════════════
       ACCESSIBILITY: Focus-visible
    ════════════════════════════════════ */
    .task-row:focus-visible,
    .task-pill:focus-visible,
    .phase-step:focus-visible,
    .phase-advance-btn:focus-visible,
    .sc-header:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }

    .task-row { position: relative; }
    .task-pill:focus-visible { outline-offset: 1px; }

    /* ════════════════════════════════════
       ACCESSIBILITY: Reduced motion
    ════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .sc { animation: none; }
      .sidebar > * { animation: none; }
      .live-dot { animation: none; }
      .sync-spin { animation: none; }
    }

    /* ════════════════════════════════════
       SVG ICONS in sections
    ════════════════════════════════════ */
    .sc-icon svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke: currentColor;
    }
    .sc-icon.c-disc svg { stroke: var(--gold); }
    .sc-icon.c-road svg { stroke: var(--mint); }
    .sc-icon.c-ux   svg { stroke: var(--sky); }
    .sc-icon.c-ui   svg { stroke: var(--violet); }

    .brand-logo svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #1a0a00;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ════════════════════════════════════
       TASK ROW EXTENDED
    ════════════════════════════════════ */
    .task-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .task-lbl { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .task-assignee {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      font-weight: 800;
      font-family: var(--fh);
      color: #fff;
      text-transform: uppercase;
      flex-shrink: 0;
      cursor: default;
    }
    .task-assignee.empty {
      background: transparent;
      border: 1.5px dashed rgba(255,255,255,.12);
      color: var(--text-3);
      font-size: 10px;
    }
    .task-duration {
      font-size: 10px;
      font-weight: 700;
      font-family: var(--fh);
      color: var(--text-2);
      background: rgba(255,255,255,.05);
      padding: 2px 7px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .task-deadline {
      font-size: 10px;
      color: var(--text-2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .task-deadline.overdue { color: var(--rose); font-weight: 600; }
    .task-menu {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      color: var(--text-3);
      transition: all .15s;
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
    }
    .task-row:hover .task-menu { opacity: 1; }
    .task-menu:hover { background: rgba(255,255,255,.08); color: var(--text-1); }

    /* ════════════════════════════════════
       ADD TASK BUTTON
    ════════════════════════════════════ */
    .add-task-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      margin-top: 6px;
      border: 1px dashed var(--border);
      border-radius: var(--r-sm);
      background: transparent;
      color: var(--text-3);
      font-size: 12px;
      font-family: var(--fb);
      cursor: pointer;
      transition: all .2s;
      width: 100%;
    }
    .add-task-btn:hover {
      border-color: var(--text-2);
      color: var(--text-2);
      background: rgba(255,255,255,.02);
    }
    .add-task-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ════════════════════════════════════
       DETAIL PANEL (slide-out)
    ════════════════════════════════════ */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 999;
    }
    .detail-overlay.open { display: block; }

    .detail-panel {
      position: fixed;
      top: 0; right: -420px;
      width: 400px;
      max-width: 90vw;
      height: 100vh;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      z-index: 1000;
      overflow-y: auto;
      transition: right .3s cubic-bezier(.4,0,.2,1);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .detail-panel.open { right: 0; }

    .dp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dp-close {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-2);
      transition: all .15s;
      background: none;
      border: none;
      font-size: 18px;
    }
    .dp-close:hover { background: rgba(255,255,255,.08); color: var(--text-1); }

    .dp-title-input {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 2px solid var(--border);
      color: var(--text-1);
      font-family: var(--fh);
      font-size: 18px;
      font-weight: 700;
      padding: 8px 0;
      outline: none;
      transition: border-color .2s;
    }
    .dp-title-input:focus { border-bottom-color: var(--gold); }

    .dp-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .dp-label {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--fh);
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .dp-input, .dp-select, .dp-textarea {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-1);
      font-family: var(--fb);
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .2s;
    }
    .dp-input:focus, .dp-select:focus, .dp-textarea:focus {
      border-color: var(--gold);
    }
    .dp-select { cursor: pointer; }
    .dp-select option { background: var(--bg-surface); color: var(--text-1); }
    .dp-textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .dp-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .dp-actions {
      display: flex;
      gap: 12px;
      margin-top: auto;
      flex-shrink: 0;
    }
    .dp-btn {
      flex: 1;
      padding: 11px 18px;
      border-radius: var(--r-sm);
      font-family: var(--fh);
      font-size: 11.5px;
      font-weight: 800;
      letter-spacing: .07em;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
      text-align: center;
      border: none;
      outline: none;
    }
    .dp-delete-btn {
      border: 1px solid rgba(244,63,94,.25);
      background: rgba(244,63,94,.06);
      color: var(--rose);
    }
    .dp-delete-btn:hover {
      background: rgba(244,63,94,.15);
      border-color: var(--rose);
    }
    .dp-confirm-btn {
      background: var(--gold);
      color: #1a0a00;
      border: 1.5px solid var(--gold);
    }
    .dp-confirm-btn:hover {
      background: #e59c1b;
      border-color: #e59c1b;
    }

    /* Color option circles */
    .color-option {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all .2s;
      outline: none;
    }
    .color-option.selected {
      border-color: #fff;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }
    
    /* Icon option buttons */
    .icon-option {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      color: var(--text-3);
      transition: all .2s;
      padding: 10px;
      outline: none;
    }
    .icon-option svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .icon-option:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text-1);
    }
    .icon-option.selected {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(244,168,35,0.06);
    }

    /* ════════════════════════════════════
       TIMELINE CARD
    ════════════════════════════════════ */
    .tl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .tl-label { font-size: 12px; color: var(--text-2); }
    .tl-value { font-size: 13px; font-weight: 600; color: var(--text-1); font-family: var(--fh); }
    .tl-divider { height: 1px; background: var(--border); margin: 10px 0; }
    .tl-phase-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }
    .tl-phase-name { font-size: 11px; color: var(--text-2); flex: 1; }
    .tl-phase-days {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--fh);
      color: var(--text-1);
      min-width: 35px;
      text-align: right;
    }
    .tl-phase-bar {
      width: 60px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.06);
      overflow: hidden;
    }
    .tl-phase-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .3s;
    }

    /* ════════════════════════════════════
       REDESIGNED KANBAN-STYLE TASK CARDS
       ════════════════════════════════════ */
    .task-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--status-color);
      border-radius: var(--r-md);
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 12px var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
      position: relative;
    }
    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--shadow);
      border-color: var(--border-hover);
    }
    .task-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
    }
    .task-card-header .tcard-group {
      color: var(--text-2);
    }
    .task-card-header .tcard-duration {
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-2);
    }
    .task-card-title-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .task-card-title {
      font-family: var(--fh);
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.35;
      flex: 1;
    }
    .task-card-assignee {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-2);
    }
    .task-card-assignee .assignee-icon {
      color: var(--status-color);
      font-size: 11px;
      display: inline-flex;
      align-items: center;
    }
    .task-card-action-box {
      background: var(--action-bg);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--text-1);
      border-left: 2px solid var(--status-color);
    }
    .task-card-action-box .action-title {
      font-weight: 700;
      color: var(--status-color);
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.05em;
    }
    .task-card-action-box .action-desc {
      color: var(--text-2);
      font-weight: 400;
    }
    .task-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .task-card-footer .tcard-date.overdue {
      color: var(--rose);
      font-weight: 600;
    }
    
    /* ON TRACK list styles */
    .ontrack-section {
      margin-top: 14px;
      border-top: 1px dashed var(--border);
      padding-top: 12px;
    }
    .ontrack-title {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ontrack-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background 0.15s;
    }
    .ontrack-row:hover {
      background: var(--bg-card-hover);
    }
    .ontrack-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--status-color);
      flex-shrink: 0;
    }
    .ontrack-lbl {
      flex: 1;
      font-size: 13px;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ontrack-lbl.done {
      color: var(--text-3);
      text-decoration: line-through;
      text-decoration-color: var(--border);
    }
    .ontrack-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
    }
    .ontrack-assignee {
      background: var(--bg-card);
      color: var(--text-2);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 800;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo"><svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg></div>
      <div>
        <div class="brand-name">BIRDY</div>
        <div class="brand-sub">Travel Agency · Web-App Project Tracker</div>
      </div>
    </div>

    <div class="header-chips">
      <div class="hchip">
        <span class="hchip-val" id="hs-total">0</span>
        <span class="hchip-lbl">Total</span>
      </div>
      <div class="hchip">
        <span class="hchip-val" id="hs-done" style="color:var(--mint)">0</span>
        <span class="hchip-lbl">Done</span>
      </div>
      <div class="hchip">
        <span class="hchip-val" id="hs-ip" style="color:var(--sky)">0</span>
        <span class="hchip-lbl">In Progress</span>
      </div>
      <div class="hchip">
        <span class="hchip-val" id="hs-bl" style="color:var(--rose)">0</span>
        <span class="hchip-lbl">Blocked</span>
      </div>
      <div class="sync-badge local" id="sync-badge">
        <span class="sync-icon" id="sync-icon">💾</span>
        <span id="sync-text">Local</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
        <svg id="theme-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </div>

    <div class="header-meta">
      <div class="h-date" id="hdate"></div>
      <div class="h-upd"  id="hupd"></div>
    </div>
  </div>
</header>

<nav class="phase-bar">
  <div class="phase-bar-inner" id="phase-bar-inner"></div>
</nav>

<main class="main">
  <div class="sections" id="sections"></div>

  <aside class="sidebar">
    <div class="scard phase-card" id="phase-card"></div>

    <div class="scard">
      <div class="scard-title">Overall Progress</div>
      <div class="chart-wrap">
        <canvas id="prog-chart" role="img" aria-label="Overall project progress doughnut chart"></canvas>
        <div class="chart-center">
          <div class="chart-pct" id="overall-pct">0%</div>
          <div class="chart-lbl">Complete</div>
        </div>
      </div>
      <div class="mini-bars" id="mini-bars"></div>
    </div>

    <div class="scard">
      <div class="scard-title">Task Breakdown</div>

  const del = ST['__deletedSections'];

function isGroupDeleted(id) {
  const del = ST['__deletedGroups'];
  return Array.isArray(del) && del.includes(id);

function syncDynamicSections() {
  // Deep clone STATIC_SECTIONS so we don't mutate the baseline data
  SECTIONS = JSON.parse(JSON.stringify(STATIC_SECTIONS)).filter(s => !isSectionDeleted(s.id));
  
  // Apply overrides to static sections (renames, color changes, icon changes)
  const overrides = ST['__sectionOverrides'] || {};
  SECTIONS.forEach(s => {
    const o = overrides[s.id];
    if (o) {
      if (o.title !== undefined) s.title = o.title;
      if (o.sub !== undefined) s.sub = o.sub;
      if (o.color !== undefined) s.color = o.color;
      if (o.iconId !== undefined && ICON_SVGS[o.iconId]) {
        s.icon = ICON_SVGS[o.iconId];
        s.iconId = o.iconId;
      }
    }
  });

  // Initialize PHASE_SECTIONS from STATIC_PHASE_SECTIONS
  PHASES.forEach(p => {
    PHASE_SECTIONS[p.id] = (STATIC_PHASE_SECTIONS[p.id] || []).filter(sid => !isSectionDeleted(sid));
  });

  // Append custom sections
  const customSecs = ST['__customSections'] || [];
  customSecs.forEach(sec => {
    if (isSectionDeleted(sec.id)) return;
    
    // Ensure groups are built correctly
    const groups = [];
    (sec.groups || []).forEach(g => {
      groups.push(g);
    });
    
    SECTIONS.push({
      ...sec,
      groups: groups
    });
    
    if (!PHASE_SECTIONS[sec.phase]) PHASE_SECTIONS[sec.phase] = [];
    if (!PHASE_SECTIONS[sec.phase].includes(sec.id)) {
      PHASE_SECTIONS[sec.phase].push(sec.id);
    }
  });

  // Inject custom groups into their respective sections (both static and custom sections)
  const customGroups = ST['__customGroups'] || [];
  customGroups.forEach(cg => {
    if (isGroupDeleted(cg.id)) return;
    const sec = SECTIONS.find(s => s.id === cg.secId);
    if (sec) {
      if (!sec.groups.some(g => g.id === cg.id)) {
        sec.groups.push({
          id: cg.id,
          title: cg.title,
          items: cg.items || []
        });
      }
    }
  });
}

function loadFromLocal() {

  const s = ST[item.id];
  return (s && s.label) || item.label;
}

function isDeleted(id) {
  const del = ST['__deletedTasks'];
  return Array.isArray(del) && del.includes(id);
}

function getCustomTasks(groupId) {
  const ct = ST['__customTasks'];
  if (!Array.isArray(ct)) return [];
  return ct.filter(t => t.groupId === groupId);
}

function getGroupItems(g) {
  // Default items (excluding deleted) + custom items for this group
  const items = g.items.filter(i => !isDeleted(i.id));
  const custom = getCustomTasks(g.id).filter(i => !isDeleted(i.id));
  return [...items, ...custom];
}

const ASSIGNEE_COLORS = ['#F4A823','#38BDF8','#A78BFA','#34D399','#F43F5E','#FBBF24','#818CF8','#FB923C'];
function assigneeColor(name) {
  if (!name) return '';
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return ASSIGNEE_COLORS[Math.abs(h) % ASSIGNEE_COLORS.length];
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function isOverdue(dueDate) {
  if (!dueDate) return false;
  return new Date(dueDate + 'T23:59:59') < new Date();
}

function getOverdueDaysStr(dueDate) {
  if (!dueDate) return '';
  const due = new Date(dueDate + 'T23:59:59');
  const today = new Date();
  due.setHours(0,0,0,0);
  today.setHours(0,0,0,0);
  const diffTime = today.getTime() - due.getTime();
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  return diffDays > 0 ? `+${diffDays}d` : '';
}

function setSyncState(state) {
  const badge = document.getElementById('sync-badge');
  const icon  = document.getElementById('sync-icon');
  const text  = document.getElementById('sync-text');
  badge.className = 'sync-badge ' + state;
  switch (state) {
    case 'synced':
      icon.innerHTML = '☁️'; icon.className = 'sync-icon';
      text.textContent = 'Synced'; break;
    case 'saving':
      icon.innerHTML = '↻'; icon.className = 'sync-icon sync-spin';
      text.textContent = 'Saving…'; break;
    case 'offline':
      icon.innerHTML = '⚠'; icon.className = 'sync-icon';
      text.textContent = 'Offline'; break;
    case 'local':
      icon.innerHTML = '💾'; icon.className = 'sync-icon';
      text.textContent = 'Local'; break;
  }
}

/* Load state from API */
async function loadFromCloud() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.data && Object.keys(json.data).length > 0) {
      ST = json.data;
      saveToLocal();
      fullRefresh();
    } else {
      // DB is empty — push local state up
      await pushToCloud();
    }
    isCloudConnected = true;
    setSyncState('synced');
  } catch (err) {
    console.warn('Cloud load failed, using localStorage:', err);
    isCloudConnected = false;
    setSyncState('offline');
  }
}

/* Save state to API (debounced) */
let saveTimer = null;

function saveToCloud() {
  if (!isCloudConnected) return;
  clearTimeout(saveTimer);
  setSyncState('saving');
  saveTimer = setTimeout(() => pushToCloud(), 400);
}

async function pushToCloud() {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: ST }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    isCloudConnected = true;
    setSyncState('synced');
  } catch (err) {
    console.warn('Cloud save failed:', err);
    setSyncState('offline');
  }
}

/* Poll for remote changes */
async function pollCloud() {
  if (!isCloudConnected) return;
  try {
    const res = await fetch(API_URL);
    if (!res.ok) return;
    const json = await res.json();
    if (json.data && JSON.stringify(json.data) !== JSON.stringify(ST)) {
      ST = json.data;
      saveToLocal();
      fullRefresh();
      setSyncState('synced');
    }
  } catch (err) {
    // silent fail on poll
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(pollCloud, POLL_MS);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

/* Combined save */
function saveST() {
  saveToLocal();
  saveToCloud();
  updateTimestamp();
}

function getActivePhaseIdx() {
  const saved = ST['__activePhase'];
  if (typeof saved === 'number' && saved >= 0 && saved < PHASES.length) return saved;
  return 0; // default: discovery
}

function setActivePhase(idx) {
  if (idx < 0 || idx >= PHASES.length) return;
  ST['__activePhase'] = idx;
  saveST();
  renderPhaseBar();
  renderPhaseCard();
  renderMiniBars();
  refreshSidebar();
}

function getPhaseStatus(idx) {
  const active = getActivePhaseIdx();
  if (idx < active)  return 'completed';
  if (idx === active) return 'active';
  return 'pending';
}

function phaseTasksComplete(phaseId) {
  const secIds = PHASE_SECTIONS[phaseId] || [];
  if (secIds.length === 0) return true; // phases with no sections can always advance
  for (const secId of secIds) {
    const sec = SECTIONS.find(s => s.id === secId);
    if (!sec) continue;
    const stats = secStats(sec);
    if (stats.d < stats.t) return false;
  }
  return true;
}

function advancePhase() {
  const idx = getActivePhaseIdx();
  if (idx >= PHASES.length - 1) return; // already at last phase
  const phase = PHASES[idx];
  if (!phaseTasksComplete(phase.id)) return;
  setActivePhase(idx + 1);
}

/* ═══════════════════════════════════
   PHASE BAR
═══════════════════════════════════ */
function renderPhaseBar() {
  const container = document.getElementById('phase-bar-inner');
  const viewIdx = getViewingPhaseIdx();
  container.innerHTML =
    PHASES.map((p, i) => {
      const status = getPhaseStatus(i);
      const isViewing = i === viewIdx;
      return `
        <div class="phase-step ${status}${isViewing ? ' viewing' : ''}" data-phase-idx="${i}">
          <div class="phase-dot">${status==='completed'?'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':i+1}</div>
          <div class="phase-lbl">${p.label}</div>
        </div>
      `;
    }).join('');

  // Bind click events — any phase is clickable for VIEWING
  container.querySelectorAll('.phase-step').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.phaseIdx);
      setViewingPhase(idx);
    });
  });
}

/* ═══════════════════════════════════
   PHASE CARD (Sidebar)
═══════════════════════════════════ */
function renderPhaseCard() {
  const viewIdx = getViewingPhaseIdx();
  const activeIdx = getActivePhaseIdx();
  const phase   = PHASES[viewIdx];
  const secIds  = PHASE_SECTIONS[phase.id] || [];
  const isLast  = activeIdx >= PHASES.length - 1;
  const allDone = phaseTasksComplete(phase.id);
  const isViewingActive = viewIdx === activeIdx;

  // Compute tasks done / total for this phase's sections
  let phaseDone = 0, phaseTotal = 0;
  secIds.forEach(secId => {
    const sec = SECTIONS.find(s => s.id === secId);
    if (!sec) return;
    const st = secStats(sec);
    phaseDone  += st.d;
    phaseTotal += st.t;
  });

  const card = document.getElementById('phase-card');
  card.className = `scard phase-card${allDone && !isLast && isViewingActive ? ' all-done' : ''}`;

  // Advance button only shows when viewing the active progress phase
  let btnHTML = '';
  if (isViewingActive) {
    const nextP = activeIdx < PHASES.length - 1 ? PHASES[activeIdx + 1] : null;
    if (isLast) {
      btnHTML = allDone
        ? `<button class="phase-advance-btn ready" disabled style="cursor:default">PROJECT COMPLETE</button>`
        : '';
    } else if (allDone) {
      btnHTML = `<button class="phase-advance-btn ready" onclick="advancePhase()">Advance to ${nextP.label} <span class="btn-arrow">→</span></button>`;
    } else if (phaseTotal > 0) {
      btnHTML = `<button class="phase-advance-btn not-ready">${phaseDone}/${phaseTotal} tasks — Complete all to advance</button>`;
    }
  } else {
    // Viewing a non-active phase — show context
    const statusLabel = viewIdx < activeIdx ? '✓ Completed' : 'Upcoming';
    btnHTML = `<div style="margin-top:10px;font-size:11px;color:var(--text-2);letter-spacing:.05em;text-transform:uppercase;font-family:var(--fh);font-weight:700;">${statusLabel}</div>`;
  }

  const titleLabel = isViewingActive ? 'Current Phase' : 'Viewing Phase';

  card.innerHTML = `
    <div class="scard-title">${titleLabel}</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span class="live-txt">${phase.label}</span>
    </div>
    <p class="phase-desc">${phase.desc}</p>
    ${btnHTML}
  `;
}

/* ═══════════════════════════════════
   SECTIONS
═══════════════════════════════════ */
function renderSections() {
  const root   = document.getElementById('sections');
  const viewIdx = getViewingPhaseIdx();
  const phase  = PHASES[viewIdx];
  const secIds = PHASE_SECTIONS[phase.id] || [];

  // Filter sections for the currently viewed phase
  const visibleSections = secIds.length > 0
    ? SECTIONS.filter(s => secIds.includes(s.id))
    : [];

  if (visibleSections.length === 0) {
    // Phase has no task sections — show empty state with Add Section action
    const emptyDesc = PHASE_EMPTY_DESC[phase.id] || phase.desc;
    root.innerHTML = `
      <div class="phase-empty" onclick="addSection('${phase.id}')" style="cursor:pointer; transition: transform .2s;" onmouseover="this.style.transform='scale(1.005)'" onmouseout="this.style.transform='scale(1)'">
        <div class="phase-empty-icon" style="color: var(--gold); border: 2.5px dashed rgba(244,168,35,0.25); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
        <div class="phase-empty-title">${phase.label}</div>
        <div class="phase-empty-sub" style="margin-bottom: 16px;">${emptyDesc}</div>
        <button class="add-task-btn" style="width: auto; border-color: var(--gold); color: var(--gold); font-size: 11.5px; font-weight: 700; padding: 8px 18px;">+ Create Main Task</button>
      </div>
    `;
    return;
  }

  // Render visible sections + Add Main Task button at the bottom of the list
  root.innerHTML = visibleSections.map(s => buildSection(s)).join('') + `
    <button class="add-task-btn" style="border-style: dashed; border-color: var(--gold); color: var(--gold); padding: 12px 24px; max-width: 250px; margin: 20px auto 0 auto; display: flex; justify-content: center; font-weight: 700;" onclick="addSection('${phase.id}')">
      + Add Main Task to ${phase.label}
    </button>
  `;
  bindSectionEvents(visibleSections);
}

function bindSectionEvents(sections) {
  const secs = sections || SECTIONS;
  secs.forEach(sec => {
    const sh = document.getElementById(`sh-${sec.id}`);
    if (sh) sh.addEventListener('click', () => toggleCollapse(sec.id));
    
    sec.groups.forEach(g => {
      const items = getGroupItems(g);
      items.forEach(item => {
        getItem(item.id, { checked: item.checked || false, status: item.status || 'todo' });
        
        // Try binding active card element click actions
        const card = document.getElementById(`tc-card-${item.id}`);
        const cardCb = document.getElementById(`tcb-card-${item.id}`);
        
        if (card) {
          card.addEventListener('click', (e) => {
            if (cardCb && (e.target === cardCb || cardCb.contains(e.target))) {
              toggleCheck(item.id, sec.id);
            } else {
              openDetailPanel(item.id, sec.id);
            }
          });
        }
        
        // Try binding ontrack row elements
        const trackRow = document.getElementById(`tc-ontrack-${item.id}`);
        const trackCb = document.getElementById(`tcb-ontrack-${item.id}`);
        
        if (trackRow) {
          trackRow.addEventListener('click', (e) => {
            if (trackCb && (e.target === trackCb || trackCb.contains(e.target))) {
              toggleCheck(item.id, sec.id);
            } else {
              openDetailPanel(item.id, sec.id);
            }
          });
        }
      });
    });
  });
}

function buildSection(sec) {
  const stats = secStats(sec);
  const pct   = stats.t ? Math.round(stats.d / stats.t * 100) : 0;
  const coll  = ST[`col-${sec.id}`] || false;

  return `
    <div class="sc ${coll ? 'collapsed' : ''}" id="sc-${sec.id}">
      <div class="sc-header" id="sh-${sec.id}">
        <div class="sc-icon ${sec.iconCls}" style="color:${sec.color}; background:${sec.color}15; box-shadow:inset 0 0 0 1px ${sec.color}30;">${sec.icon}</div>
        <div class="sc-title-group">
          <div class="sc-title" style="display: flex; align-items: center; gap: 8px;">
            <span>${sec.title}</span>
            <span onclick="event.stopPropagation(); openSecEditPanel('${sec.id}')" style="display:inline-flex; align-items:center; cursor:pointer;" title="Edit Main Task">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </span>
            <span onclick="event.stopPropagation(); deleteSection('${sec.id}')" style="display:inline-flex; align-items:center; cursor:pointer;" title="Delete Main Task">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </span>
          </div>
          <div class="sc-sub">${sec.sub}</div>
        </div>
        <div class="sc-meta">
          <span class="ptag ${sec.phaseTag}">${sec.phase.toUpperCase()}</span>
          <span class="sc-count" style="color:${sec.color}">${stats.d}/${stats.t}</span>
          <div class="sc-chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>
      </div>
      <div class="sc-bar">
        <div class="sc-bar-fill" id="sbf-${sec.id}" style="width:${pct}%;background:${sec.color}"></div>
      </div>
      <div class="sc-body">
        ${sec.groups.map(g => buildGroup(g, sec.id)).join('')}
        <button class="add-task-btn" style="border-color: rgba(255,255,255,0.06); margin-top: 12px; max-width: 140px; font-size: 11px; padding: 6px 12px;" onclick="addGroup('${sec.id}')">
          + Add Group
        </button>
      </div>
    </div>
  `;
}

function buildGroup(g, secId) {
  const items = getGroupItems(g);
  
  // Partition items
  const activeItems = [];
  const onTrackItems = [];
  
  items.forEach(item => {
    const s = getItem(item.id, { checked: item.checked || false, status: item.status || 'todo' });
    if (s.status === 'in-progress' || s.status === 'blocked') {
      activeItems.push(item);
    } else {
      onTrackItems.push(item);
    }
  });

  const activeHTML = activeItems.map(i => buildTaskCard(i, g.title, secId)).join('');
  
  let onTrackHTML = '';
  if (onTrackItems.length > 0) {
    onTrackHTML = `
      <div class="ontrack-section">
        <div class="ontrack-title">
          <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.6; margin-right: 4px;"><polyline points="20 6 9 17 4 12"/></svg>
          ON TRACK / COMPLETE
        </div>
        <div class="ontrack-list">
          ${onTrackItems.map(i => buildOnTrackRow(i, secId)).join('')}
        </div>
      </div>
    `;
  }

  return `
    <div class="tg" id="tg-${g.id}">
      <div class="tg-title" style="display: flex; align-items: center; gap: 8px;">
        <span>${g.title}</span>
        ${g.badge ? `<span class="tg-badge">${g.badge}</span>` : ''}
        ${isCustomGroup(g.id) ? `
          <span onclick="renameGroup('${g.id}', '${secId}')" style="display:inline-flex; align-items:center; cursor:pointer;" title="Rename Group">
            <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.4;"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </span>
          <span onclick="deleteGroup('${g.id}', '${secId}')" style="display:inline-flex; align-items:center; cursor:pointer;" title="Delete Group">
            <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.4;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </span>
        ` : ''}
      </div>
      <div class="task-list">
        ${activeHTML}
        ${onTrackHTML}
      </div>
      <button class="add-task-btn" onclick="addTask('${g.id}','${secId}')">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </div>
  `;
}

function buildTaskCard(item, groupTitle, secId) {
  const s = getItem(item.id, { checked: item.checked || false, status: item.status || 'todo' });
  const label = getTaskLabel(item);
  
  const statusColor = s.status === 'blocked' ? 'var(--rose)' : 'var(--sky)';
  const actionBg = s.status === 'blocked' ? 'var(--rose-dim)' : 'var(--sky-dim)';
  const actionTitleText = s.status === 'blocked' ? 'BLOCKER / ACTION REQUIRED' : 'NEXT STEPS / IN PROGRESS';
  
  const desc = s.note && s.note.trim() 
    ? s.note.trim() 
    : (s.status === 'blocked' 
        ? 'Identify blocker details and resolve to resume operations.' 
        : 'Active task in progress. Tap to open details and add notes.');
        
  const durationHTML = s.duration ? `<span class="tcard-duration">${s.duration}d</span>` : '';
  const assigneeHTML = s.assignee 
    ? `<div class="task-card-assignee" style="margin-top: 2px;"><span class="assignee-icon">◊</span><span>${s.assignee}</span></div>` 
    : '';
    
  const overdueStr = getOverdueDaysStr(s.dueDate);
  const overdueCls = overdueStr ? ' overdue' : '';
  const dateLabel = s.dueDate 
    ? `<span class="tcard-date${overdueCls}">${overdueStr ? 'overdue ' + overdueStr : 'due ' + fmtDate(s.dueDate)}</span>`
    : '';

  return `
    <div class="task-card" id="tc-card-${item.id}" style="--status-color: ${statusColor}; --action-bg: ${actionBg};">
      <div class="task-card-header">
        <span class="tcard-group">${groupTitle}</span>
        ${durationHTML}
      </div>
      <div class="task-card-title-row">
        <div class="task-cb ${s.checked ? 'on' : ''}" id="tcb-card-${item.id}"></div>
        <div class="task-card-title">${label}</div>
      </div>
      ${assigneeHTML}
      <div class="task-card-action-box">
        <div class="action-title">${actionTitleText}</div>
        <div class="action-desc">${desc}</div>
      </div>
      <div class="task-card-footer">
        ${dateLabel}
        <div style="font-size: 10px; font-weight: 700; text-transform: uppercase; color: ${statusColor};">${s.status}</div>
      </div>
    </div>
  `;
}

function buildOnTrackRow(item, secId) {
  const s = getItem(item.id, { checked: item.checked || false, status: item.status || 'todo' });
  const label = getTaskLabel(item);
  
  const statusColor = s.status === 'done' ? 'var(--mint)' : 'var(--text-3)';
  const labelCls = s.checked ? 'done' : '';
  
  const assigneeHTML = s.assignee 
    ? `<div class="ontrack-assignee" style="background:${assigneeColor(s.assignee)}" title="${s.assignee}">${s.assignee.charAt(0)}</div>`
    : '';
    
  const dateStr = s.dueDate ? fmtDate(s.dueDate) : '';
  const durationStr = s.duration ? `${s.duration}d` : '';

  return `
    <div class="ontrack-row" id="tc-ontrack-${item.id}" style="--status-color: ${statusColor};">
      <div class="ontrack-dot"></div>
      <div class="task-cb ${s.checked ? 'on' : ''}" id="tcb-ontrack-${item.id}" style="width: 14px; height: 14px; border-radius: 4px; font-size: 8px;"></div>
      <div class="ontrack-lbl ${labelCls}">${label}</div>
      <div class="ontrack-meta">
        ${assigneeHTML}
        ${durationStr ? `<span>${durationStr}</span>` : ''}
        ${dateStr ? `<span>${dateStr}</span>` : ''}
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════
   ACTIONS
═══════════════════════════════════ */
function toggleCollapse(id) {
  const el = document.getElementById(`sc-${id}`);
  el.classList.toggle('collapsed');
  ST[`col-${id}`] = el.classList.contains('collapsed');
  saveST();
}

function toggleCheck(id, secId) {
  const s = getItem(id, {});
  s.checked = !s.checked;
  if (s.checked && s.status === 'todo')  s.status = 'done';
  if (!s.checked && s.status === 'done') s.status = 'todo';
  saveST();
  renderSections();
  refreshSection(secId);
  refreshSidebar();
}

function cycleStatus(id, secId) {
  const s = getItem(id, {});
  const i = STATUS_CYCLE.indexOf(s.status);
  s.status = STATUS_CYCLE[(i + 1) % STATUS_CYCLE.length];
  if (s.status === 'done')        s.checked = true;
  if (s.status === 'todo')        s.checked = false;
  if (s.status === 'blocked')     s.checked = false;
  if (s.status === 'in-progress') s.checked = false;
  saveST();
  renderSections();
  refreshSection(secId);
  refreshSidebar();
}

/* ═══════════════════════════════════
   FULL REFRESH
═══════════════════════════════════ */
function fullRefresh() {
  syncDynamicSections();
  renderPhaseBar();
  renderPhaseCard();
  renderSections();
  renderMiniBars();
  refreshSidebar();
}

/* ═══════════════════════════════════
   STATS
═══════════════════════════════════ */
function secStats(sec) {
  let d=0, t=0;
  sec.groups.forEach(g => {
    const items = getGroupItems(g);
    items.forEach(item => {
      const s = getItem(item.id, { checked: item.checked || false, status: item.status || 'todo' });
      t++;
      if (s.checked) d++;
    });
  });
  return { d, t };
}

function phaseStats(phase) {
  const secIds = PHASE_SECTIONS[phase.id] || [];
  let d = 0, t = 0;
  secIds.forEach(secId => {
    const sec = SECTIONS.find(s => s.id === secId);
    if (!sec) return;
    const st = secStats(sec);
    d += st.d;
    t += st.t;
  });
  return { d, t };
}

function getPhasePct(phase, idx) {
  const stats = phaseStats(phase);
  if (stats.t === 0) {
    const activeIdx = getActivePhaseIdx();
    return idx < activeIdx ? 100 : 0;
  }
  return Math.round(stats.d / stats.t * 100);
}

function allStats() {
  let t=0,d=0,ip=0,bl=0;
  SECTIONS.forEach(sec => sec.groups.forEach(g => {
    const items = getGroupItems(g);
    items.forEach(item => {
      const s = getItem(item.id, { checked: item.checked || false, status: item.status || 'todo' });
      t++;
      if (s.checked)                d++;
      if (s.status==='in-progress') ip++;
      if (s.status==='blocked')     bl++;
    });
  }));
  return { t,d,ip,bl };
}

function refreshSection(id) {
  const sec = SECTIONS.find(s => s.id === id);
  if (!sec) return;
  const stats = secStats(sec);
  const pct   = stats.t ? Math.round(stats.d / stats.t * 100) : 0;
  const fill  = document.getElementById(`sbf-${id}`);
  const count = document.querySelector(`#sc-${id} .sc-count`);
  if (fill)  fill.style.width  = `${pct}%`;
  if (count) count.textContent = `${stats.d}/${stats.t}`;

  // Update parent phase progress bar in the sidebar
  const phaseId = sec.phase;
  const phase = PHASES.find(p => p.id === phaseId);
  if (phase) {
    const idx = PHASES.indexOf(phase);
    const pPct = getPhasePct(phase, idx);
    const mbar  = document.getElementById(`mb-${phaseId}`);
    const mpct  = document.getElementById(`mp-${phaseId}`);
    if (mbar)  mbar.style.width  = `${pPct}%`;
    if (mpct)  mpct.textContent  = `${pPct}%`;
  }
}

/* ═══════════════════════════════════
   SIDEBAR
═══════════════════════════════════ */
let chart = null;

function initChart() {
  const ctx = document.getElementById('prog-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets:[{
        data: [0, 100],
        backgroundColor: ['#F4A823', 'rgba(255,255,255,0.05)'],
        borderColor:     ['#F4A823', 'rgba(255,255,255,0.05)'],
        borderWidth: 1,
        hoverOffset: 0,
      }]
    },
    options: {
      cutout: '73%',
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend:{display:false}, tooltip:{enabled:false} },
      animation: { duration:700, easing:'easeInOutQuart' },
    }
  });
}

function renderMiniBars() {
  document.getElementById('mini-bars').innerHTML = PHASES.map((phase, idx) => {
    const pct = getPhasePct(phase, idx);
    return `
      <div class="mbar-row">
        <div class="mbar-head">
          <span class="mbar-name">${phase.title}</span>
          <span class="mbar-pct" id="mp-${phase.id}">${pct}%</span>
        </div>
        <div class="mbar-track">
          <div class="mbar-fill" id="mb-${phase.id}" style="width:${pct}%;background:${phase.color}"></div>
        </div>
      </div>
    `;
  }).join('');
}

function refreshSidebar() {
  const s   = allStats();
  const pct = s.t ? Math.round(s.d / s.t * 100) : 0;
  document.getElementById('overall-pct').textContent = `${pct}%`;
  ['hs-total','qs-total'].forEach(id => document.getElementById(id).textContent = s.t);
  ['hs-done', 'qs-done' ].forEach(id => document.getElementById(id).textContent = s.d);
  ['hs-ip',   'qs-ip'   ].forEach(id => document.getElementById(id).textContent = s.ip);
  ['hs-bl',   'qs-bl'   ].forEach(id => document.getElementById(id).textContent = s.bl);
  if (chart) {
    chart.data.datasets[0].data = [pct, Math.max(0, 100-pct)];
    chart.update();
  }
  renderPhaseCard();
  renderTimeline();
}
