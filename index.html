function openDetailPanel(taskId, secId) {
  dpTaskId = taskId;
  dpSecId = secId;

  // Find task label
  let defaultLabel = 'New Task';
  // Search default sections
  for (const sec of SECTIONS) {
    for (const g of sec.groups) {
      const found = g.items.find(item => item.id === taskId);
      if (found) {
        defaultLabel = found.label;
        break;
      }
    }
  }

  const s = getItem(taskId, { checked: false, status: 'todo' });
  const label = s.label || defaultLabel;

  document.getElementById('dp-title').value = label;
  document.getElementById('dp-assignee').value = s.assignee || '';
  document.getElementById('dp-status').value = s.status || 'todo';
  document.getElementById('dp-start').value = s.startDate || '';
  document.getElementById('dp-due').value = s.dueDate || '';
  document.getElementById('dp-duration').value = s.duration || '';
  document.getElementById('dp-note').value = s.note || '';

  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetailPanel() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  dpTaskId = null;
  dpSecId = null;
}

function bindDetailPanel() {
  const overlay = document.getElementById('detail-overlay');
  const closeBtn = document.getElementById('dp-close');
  const deleteBtn = document.getElementById('dp-delete');
  const confirmBtn = document.getElementById('dp-confirm');

  overlay.addEventListener('click', closeDetailPanel);
  closeBtn.addEventListener('click', closeDetailPanel);

  deleteBtn.addEventListener('click', () => {
    if (dpTaskId) {
      deleteTask(dpTaskId, dpSecId);
    }
  });

  confirmBtn.addEventListener('click', () => {
    savePanelData();
    closeDetailPanel();
  });

  // Calculate duration automatically if start date and deadline are selected
  const startEl = document.getElementById('dp-start');
  const dueEl = document.getElementById('dp-due');
  const durEl = document.getElementById('dp-duration');

  const onDateChange = () => {
    const startVal = startEl.value;
    const dueVal = dueEl.value;
    if (startVal && dueVal) {
      const start = new Date(startVal + 'T00:00:00');
      const due = new Date(dueVal + 'T00:00:00');
      const diffTime = due - start;
      const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24)) + 1;
      durEl.value = Math.max(0, diffDays);
    }
    savePanelData();
  };

  const onDurationChange = () => {
    const startVal = startEl.value;
    const durVal = parseInt(durEl.value);
    if (startVal && durVal > 0) {
      const start = new Date(startVal + 'T00:00:00');
      start.setDate(start.getDate() + durVal - 1);
      const yyyy = start.getFullYear();
      const mm = String(start.getMonth() + 1).padStart(2, '0');
      const dd = String(start.getDate()).padStart(2, '0');
      dueEl.value = `${yyyy}-${mm}-${dd}`;
    }
    savePanelData();
  };

  startEl.addEventListener('change', onDateChange);
  dueEl.addEventListener('change', onDateChange);
  durEl.addEventListener('change', onDurationChange);
  durEl.addEventListener('input', onDurationChange);

  // Autosave on other inputs
  const otherInputs = ['dp-title', 'dp-assignee', 'dp-status', 'dp-note'];
  otherInputs.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('change', () => savePanelData());
    el.addEventListener('input', () => savePanelData());
  });
}

function savePanelData() {
  if (!dpTaskId) return;

  const s = getItem(dpTaskId, {});
  
  const titleVal = document.getElementById('dp-title').value.trim();
  const statusVal = document.getElementById('dp-status').value;
  const assigneeVal = document.getElementById('dp-assignee').value.trim();
  const startVal = document.getElementById('dp-start').value;
  const dueVal = document.getElementById('dp-due').value;
  const durVal = parseInt(document.getElementById('dp-duration').value);
  const noteVal = document.getElementById('dp-note').value.trim();

  s.label = titleVal || 'Unnamed Task';
  s.status = statusVal;
  s.checked = (statusVal === 'done');
  s.assignee = assigneeVal;
  s.startDate = startVal;
  s.dueDate = dueVal;
  s.duration = isNaN(durVal) ? 0 : durVal;
  s.note = noteVal;

  saveST();
  
  // Update task list and stats
  const row = document.getElementById(`tr-${dpTaskId}`);
  if (row) {
    // Rebuild task row inner content
    let defaultItem = { id: dpTaskId, label: s.label, checked: s.checked, status: s.status };
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = buildTaskRow(defaultItem);
    const newRow = tempDiv.firstElementChild;
    row.className = newRow.className;
    row.innerHTML = newRow.innerHTML;
    // Rebind events to new row elements
    const pill = row.querySelector('.task-pill');
    const menu = row.querySelector('.task-menu');
    const cb = row.querySelector('.task-cb');
    
    cb.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCheck(dpTaskId, dpSecId);
    });
    if (pill) pill.addEventListener('click', (e) => { e.stopPropagation(); cycleStatus(dpTaskId, dpSecId); });
    if (menu) menu.addEventListener('click', (e) => { e.stopPropagation(); openDetailPanel(dpTaskId, dpSecId); });
  }

  // Update section count and sidebar stats
  refreshSection(dpSecId);
  refreshSidebar();
}

function addTask(groupId, secId) {
  const newId = `custom-${Date.now()}`;
  const customTask = {
    id: newId,
    groupId: groupId,
    label: 'New Task',
    checked: false,
    status: 'todo'
  };

  // Add to custom tasks array in ST
  if (!Array.isArray(ST['__customTasks'])) {
    ST['__customTasks'] = [];
  }
  ST['__customTasks'].push(customTask);

  // Initialize task state
  ST[newId] = {
    checked: false,
    status: 'todo',
    label: 'New Task',
    assignee: '',
    startDate: '',
    dueDate: '',
    duration: 0,
    note: ''
  };

  saveST();
  renderSections();
  openDetailPanel(newId, secId);
}

function deleteTask(taskId, secId) {
  if (!confirm('Are you sure you want to delete this task?')) return;

  if (taskId.startsWith('custom-')) {
    // Remove from custom tasks
    if (Array.isArray(ST['__customTasks'])) {
      ST['__customTasks'] = ST['__customTasks'].filter(t => t.id !== taskId);
    }
  } else {
    // Mark default task as deleted
    if (!Array.isArray(ST['__deletedTasks'])) {
      ST['__deletedTasks'] = [];
    }
    if (!ST['__deletedTasks'].includes(taskId)) {
      ST['__deletedTasks'].push(taskId);
    }
  }

  // Clean up ST entry
  delete ST[taskId];

  saveST();
  closeDetailPanel();
  renderSections();
  refreshSidebar();
}

/* ═══════════════════════════════════
   TIMELINE ESTIMATION
   ═══════════════════════════════════ */
function renderTimeline() {
  const card = document.getElementById('timeline-card');
  if (!card) return;

  // Calculate timeline details
  let totalDuration = 0;
  let earliestStart = null;
  const phaseDurations = {};

  // Initialize phase durations
  PHASES.forEach(p => {
    phaseDurations[p.id] = 0;
  });

  // Keep track of milestone specific stats
  const m1Phases = ['discovery', 'ux', 'ui', 'prototype', 'lock'];
  const m2Phases = ['development', 'testing', 'launch', 'maintenance'];

  let m1Dur = 0;
  let m2Dur = 0;

  let m1TotalTasks = 0;
  let m1DoneTasks = 0;
  let m2TotalTasks = 0;
  let m2DoneTasks = 0;

  // Accumulate durations from all tasks (default and custom, active)
  SECTIONS.forEach(sec => {
    sec.groups.forEach(g => {
      const items = getGroupItems(g);
      items.forEach(item => {
        const s = ST[item.id] || {};
        const dur = s.duration || 0;
        totalDuration += dur;

        // Track phase-wise duration
        const phaseId = sec.phase; 
        if (phaseDurations[phaseId] !== undefined) {
          phaseDurations[phaseId] += dur;
        }

        // Milestone group durations
        if (m1Phases.includes(phaseId)) {
          m1Dur += dur;
          m1TotalTasks++;
          if (s.checked) m1DoneTasks++;
        } else if (m2Phases.includes(phaseId)) {
          m2Dur += dur;
          m2TotalTasks++;
          if (s.checked) m2DoneTasks++;
        }

        // Track earliest start date
        if (s.startDate) {
          const d = new Date(s.startDate + 'T00:00:00');
          if (!earliestStart || d < earliestStart) {
            earliestStart = d;
          }
        }
      });
    });
  });

  // Fallback to today if no start date set yet
  const baseStart = earliestStart ? new Date(earliestStart) : new Date();

  // Milestone 1 dates
  const m1Start = new Date(baseStart);
  const m1End = new Date(m1Start);
  if (m1Dur > 0) {
    m1End.setDate(m1End.getDate() + m1Dur - 1);
  }

  // Milestone 2 dates
  const m2Start = new Date(m1End);
  m2Start.setDate(m2Start.getDate() + 1);
  const m2End = new Date(m2Start);
  if (m2Dur > 0) {
    m2End.setDate(m2End.getDate() + m2Dur - 1);
  }

  const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const startDateStr = earliestStart ? fmt(baseStart) : 'Not set';
  const completionDateStr = earliestStart ? fmt(m2End) : 'Not set';

  const m1StartStr = earliestStart ? fmt(m1Start) : 'Not set';
  const m1EndStr = earliestStart ? fmt(m1End) : 'Not set';
  const m2StartStr = earliestStart ? fmt(m2Start) : 'Not set';
  const m2EndStr = earliestStart ? fmt(m2End) : 'Not set';

  // Progress percentages
  const m1Progress = m1TotalTasks ? Math.round((m1DoneTasks / m1TotalTasks) * 100) : 0;
  const m2Progress = m2TotalTasks ? Math.round((m2DoneTasks / m2TotalTasks) * 100) : 0;

  // Active milestone styling
  const activePhaseIdx = getActivePhaseIdx();
  const activePhase = PHASES[activePhaseIdx]?.id;
  const isM1Active = m1Phases.includes(activePhase);
  const isM2Active = m2Phases.includes(activePhase);

  // Milestone 1 Tag Config
  let m1TagText = 'Upcoming';
  let m1TagBg = 'rgba(255,255,255,.05)';
  let m1TagColor = 'var(--text-3)';
  if (m1Progress === 100) {
    m1TagText = 'Complete';
    m1TagBg = 'rgba(52,211,153,.1)';
    m1TagColor = 'var(--mint)';
  } else if (isM1Active || m1Progress > 0) {
    m1TagText = 'Active';
    m1TagBg = 'rgba(244,168,35,.1)';
    m1TagColor = 'var(--gold)';
  }

  // Milestone 2 Tag Config
  let m2TagText = 'Upcoming';
  let m2TagBg = 'rgba(255,255,255,.05)';
  let m2TagColor = 'var(--text-3)';
  if (m2Progress === 100) {
    m2TagText = 'Complete';
    m2TagBg = 'rgba(52,211,153,.1)';
    m2TagColor = 'var(--mint)';
  } else if (isM2Active || m2Progress > 0) {
    m2TagText = 'Active';
    m2TagBg = 'rgba(56,189,248,.1)';
    m2TagColor = 'var(--sky)';
  }

  const m1Color = m1Progress === 100 ? 'var(--mint)' : 'var(--gold)';
  const m2Color = m2Progress === 100 ? 'var(--mint)' : 'var(--sky)';

  // Build Phase breakdown bars html
  const breakdownHTML = PHASES.map((p, idx) => {
    const dur = phaseDurations[p.id] || 0;
    if (dur === 0) return ''; // Skip phases with 0 days defined

    const color = p.color || SECTIONS.find(s => s.phase === p.id)?.color || '#5A6B7D';
    const status = getPhaseStatus(idx);
    
    let phaseTotalTasks = 0;
    let phaseCompletedTasks = 0;
    
    let totalSecIds = PHASE_SECTIONS[p.id] || [];
    totalSecIds.forEach(secId => {
      const sec = SECTIONS.find(s => s.id === secId);
      if (!sec) return;
      sec.groups.forEach(g => {
        const items = getGroupItems(g);
        items.forEach(item => {
          const s = ST[item.id] || {};
          phaseTotalTasks++;
          if (s.checked) {
            phaseCompletedTasks++;
          }
        });
      });
    });
    
    const fillWidth = phaseTotalTasks ? Math.round((phaseCompletedTasks / phaseTotalTasks) * 100) : (status === 'completed' ? 100 : 0);

    return `
      <div class="tl-phase-row">
        <span class="tl-phase-name">${p.label}</span>
        <div class="tl-phase-bar">
          <div class="tl-phase-fill" style="width:${fillWidth}%;background:${color}"></div>
        </div>
        <span class="tl-phase-days">${dur}d</span>
      </div>
    `;
  }).join('');

  card.innerHTML = `
    <div class="scard-title">Timeline Estimate</div>
    <div class="tl-row">
      <span class="tl-label">Total Duration</span>
      <span class="tl-value">${totalDuration} days</span>
    </div>
    <div class="tl-row">
      <span class="tl-label">Est. Start Date</span>
      <span class="tl-value">${startDateStr}</span>
    </div>
    <div class="tl-row">
      <span class="tl-label">Est. Completion</span>

/* ═══════════════════════════════════
   THEME TOGGLE (LIGHT/DARK)
   ═══════════════════════════════════ */
const SUN_SVG = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
const MOON_SVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;

function initTheme() {
  const toggleBtn = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-icon');
  if (!toggleBtn || !icon) return;

  const currentTheme = localStorage.getItem('theme') || 'dark';

  if (currentTheme === 'light') {
    document.body.classList.add('light-theme');
    icon.innerHTML = MOON_SVG;
  } else {
    document.body.classList.remove('light-theme');
    icon.innerHTML = SUN_SVG;
  }

  toggleBtn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light-theme');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    icon.innerHTML = isLight ? MOON_SVG : SUN_SVG;
  });
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
async function init() {
  // 1. Load from localStorage first (instant paint)
  loadFromLocal();
  initTheme();

  // 2. Render everything
  renderPhaseBar();
  renderPhaseCard();
  renderSections();
  renderMiniBars();
  initChart();
  refreshSidebar();
  renderTimeline();
  updateDate();
  bindDetailPanel();
  bindSecEditPanel();

  // 3. Try loading from Neon cloud
  setSyncState('saving'); // show "connecting"
  await loadFromCloud();

  // 4. Start polling for remote changes
  if (isCloudConnected) startPolling();
}

init();
</script>
